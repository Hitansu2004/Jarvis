# J.A.R.V.I.S. Security Policy v5.0
# All commands from all agents pass through sandbox/executor.py

paths:
  read_write_allowed:
    - "~/Workspace/"
    - "~/Projects/"
    - "~/Downloads/"
    - "~/Documents/Jarvis/"
  
  read_only:
    - "~/Desktop/"
  
  blocked:
    - "/"
    - "/etc/"
    - "/System/"
    - "/Library/Keychains/"
    - "~/.ssh/"
    - "/private/var/"
    - "~/.env"
    - "~/.gitconfig"

network:
  allowed_domains:
    - "localhost"
    - "127.0.0.1"
    - "api.github.com"
    - "stackoverflow.com"
    - "pypi.org"
    - "npmjs.com"
    - "ollama.com"
    - "google.com"
    - "flipkart.com"
    - "amazon.in"
    - "huggingface.co"
    - "vertexai.googleapis.com"
    - "aiplatform.googleapis.com"
  blocked_by_default: true

commands:
  blocked_prefixes:
    - "sudo"
    - "su "
    - "chmod 777"
    - "rm -rf /"
    - "dd if="
    - "mkfs"
    - "> /dev/"
    - "curl | bash"
    - "wget | bash"

confirmations:
  always_required:
    - FILE_DELETE
    - FORM_SUBMIT
    - PURCHASE
    - GIT_FORCE_PUSH
    - NPM_PUBLISH
    - EMAIL_SEND
    - SLACK_SEND
  double_confirmation_required:
    - FILE_DELETE
    - PURCHASE

clipboard:
  access: "explicit_only"
  policy: "Only access clipboard when user explicitly says 'use what is in my clipboard'"

api_keys:
  log: false
  speak: false
  write_to_memory: false
  note: "API keys are invisible to all agents. Mode manager handles them."

# --- PHASE 2 ADDITIONS ---

# Sensitive file patterns — extra warnings even in allowed directories
sensitive_patterns:
  file_extensions:
    - ".env"
    - ".key"
    - ".pem"
    - ".p12"
    - ".pfx"
    - ".cert"
    - ".crt"
    - ".keystore"
  file_names:
    - ".env"
    - ".env.local"
    - ".env.production"
    - "id_rsa"
    - "id_ed25519"
    - "*.secret"
    - "credentials.json"
    - "jarvis_vertex_key.json"

# Pending confirmation settings
confirmation_settings:
  expiry_seconds: 300       # 5 minutes before pending expires
  cleanup_interval_seconds: 60
  file_preview_chars: 100   # Characters to read for FILE_DELETE preview

# Security violation response
violations:
  speak_alert: true         # Print TTS-style alert to console
  log_immediately: true     # Write to audit log without delay
  alert_prefix: "[JARVIS SECURITY]"

# Audit log settings
audit:
  hash_algorithm: "sha256"
  chain_enabled: true
  redact_api_keys: true
  max_log_size_mb: 100      # Rotate when audit.log exceeds this size
  rotation_backup_count: 5  # Keep 5 rotated backups

# Commands that are always auto-approved (no confirmation needed)
auto_approved_commands:
  - "ls"
  - "pwd"
  - "echo"
  - "cat"    # read only
  - "head"
  - "tail"
  - "grep"
  - "find"   # read only
  - "which"
  - "whoami"
  - "date"
  - "uname"
